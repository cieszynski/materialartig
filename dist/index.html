    <style>
        @font-face {
            font-family: "Icons";
            font-style: normal;
            src: url("/fonts/materialicons-regular-webfont.woff2") format('woff2');
            font-display: swap;
        }

        @font-face {
            font-family: "Icons-Outlined";
            font-style: normal;
            src: url("/fonts/materialiconsoutlined-regular-webfont.woff2") format('woff2');
            font-display: swap;
        }

        @font-face {
            font-family: "Roboto";
            font-style: normal;
            font-weight: 400;
            src: url("/fonts/roboto-regular-webfont.woff2") format('woff2');
            font-display: swap;
        }

        @font-face {
            font-family: "Roboto";
            font-style: normal;
            font-weight: 500;
            src: url("/fonts/roboto-medium-webfont.woff2") format('woff2');
            font-display: swap;
        }

        .typeface-brand {
            font-family: Roboto;
        }

        .typeface-plain {
            font-family: Roboto;
        }

        /* TextCommonButton */
        .typescale-label-large {
            font-weight: 500;
            font-size: 14rem;
            line-height: 20rem;
            letter-spacing: .1rem;
        }

        .typescale-label-medium {
            font-weight: 500;
            font-size: 12rem;
            line-height: 16rem;
            letter-spacing: .5rem;
        }

        :root {
            --typeface-plain: Roboto;
            --typeface-brand: Roboto;

            --typescale-title-large: 400 22rem/25rem var(--typeface-brand);
            --typescale-title-large-tracking: 0;

            --typescale-title-medium: 500 16rem/24rem var(--typeface-plain);
            --typescale-title-medium-tracking: .15;

            --typescale-title-small: 500 14rem/20rem var(--typeface-plain);
            --typescale-title-small-tracking: .1;

            --typescale-label-large: 500 14rem/20rem var(--typeface-plain);
            --typescale-label-large-tracking: .1;

            --typescale-label-medium: 500 12rem/16rem var(--typeface-plain);
            --typescale-label-medium-tracking: .5;

            --typescale-body-large: 500 16rem/24rem var(--typeface-plain);
            --typescale-body-large-tracking: .5;

            --typescale-body-medium: 400 14rem/20rem var(--typeface-plain);
            --typescale-body-medium-tracking: .25;
        }
    </style>

    <style>
        :root {
            /* IconButton,FilledIconButton,TextCommonButton,OutlinedCommonButton */
            --color-primary: var(--color-light-primary, 103, 80, 164);

            /* OutlinedIconToggleButton */
            --color-inverse-surface: var(--color-light-inverse-surface, 49, 48, 51);

            /* OutlinedIconToggleButton */
            --color-on-inverse-surface: var(--color-light-on-inverse-surface, 244, 239, 244);

            /* FilledIconButton, FilledIconToggleButton, FilledTonalIconButton, FilledTonalIconToggleButton */
            --color-on-primary: var(--color-light-on-primary, 255, 255, 255);

            /* FilledTonalIconButton, FilledTonalIconToggleButton */
            --color-on-secondary-container: var(--color-light-on-secondary-container, 30, 25, 43);

            /* IconButton */
            --color-on-surface: var(--color-light-on-surface, 28, 27, 31);

            /* IconButton, OutlinedIconButton */
            --color-on-surface-variant: var(--color-light-on-surface-variant, 73, 69, 78);

            /* OutlinedIconButton */
            --color-outline: var(--color-light-outline, 121, 116, 126);

            --color-outline-variant: var(--color-light-outline-variant, 196, 199, 197);

            /* FilledTonalIconButton */
            --color-secondary-container: var(--color-light-secondary-container, 232, 222, 248);

            --color-shadow: var(--color-light-shadow, 0, 0, 0);

            --color-surface: var(--color-light-surface, 255, 251, 254);

            /* ElevatedCommonButton */
            --color-surface-container-low: var(--color-light-surface-container-low, 247, 242, 247);
            /*  */
            --color-surface-container-highest: var(--color-light-surface-container-highest, 230, 225, 229);

            --color-surface-variant: var(--color-light-surface-variant, 231, 224, 236);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-primary: var(--color-dark-primary, 208, 188, 255);
                --color-inverse-surface: var(--color-dark-inverse-surface, 230, 225, 229);
                --color-on-inverse-surface: var(--color-dark-on-inverse-surface, 49, 48, 51);
                --color-on-primary: var(--color-dark-on-primary, 55, 30, 115);
                --color-on-secondary-container: var(--color-dark-on-secondary-container, 232, 222, 248);
                --color-on-surface: var(--color-dark-on-surface, 230, 225, 229);
                --color-on-surface-variant: var(--color-dark-on-surface-variant, 202, 196, 208);
                --color-outline: var(--color-dark-outline, 147, 143, 153);
                --color-outline-variant: var(--color-dark-outline-variant, 68, 71, 70);
                --color-secondary-container: var(--color-dark-secondary-container, 74, 68, 88);
                --color-shadow: var(--color-light-shadow, 0, 0, 0);
                --color-surface: var(--color-dark-surface, 28, 27, 31);
                --color-surface-container-low: var(--color-dark-surface-container-low, 28, 27, 30);
                --color-surface-container-highest: var(--color-dark-surface-container-highest, 73, 69, 79);
                --color-surface-variant: var(--color-dark-surface-variant, 73, 69, 79);
            }
        }
    </style>

        CSS`
        a.navigationitem {
            color: rgba(var(--color-on-surface-variant), 1);
            font: var(--typescale-label-medium);
            letter-spacing: var(--typescale-label-medium-tracking);
            display: block;
            position: relative;
            height: 80rem;
            text-align: center;
            text-decoration: none;
        }

        a.navigationitem::before {
            font-family: Icons-Outlined;
            font-size: 24rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 12rem auto 4rem auto;
            border-radius: 16rem;
            width: 64rem;
            height: 32rem;
            content: attr(data-icon);
        }
        
        a.navigationitem.selected::before {
            font-family: Icons;
            background-color: #888;
        }
        a.navigationitem:active,
        a.navigationitem:focus {
        outline: 1px solid red;
            background-color: none;
        }

        body.rail
          a.navigationitem,
        body.medium:not(.bar)
          a.navigationitem {
            width: 80rem;
            height: 56rem;
        }

        body.expanded:not(.bar, .rail)
          a.navigationitem {
            width: 360rem;
            height: 56rem;
        }
        `
        class NavigationItem extends Widget {

            static #num = 0;

            constructor(properties) {
                super(properties, {
                    nodeName: 'a',
                    /* on begin select the 1st item */
                    className: `navigationitem ${(location.hash.length > 1 && location.hash.endsWith(properties.href)) ? 'selected' : !NavigationItem.#num++ ? 'selected' : ''}`
                });

                /*                 console.log(location.hash.length>1, location.hash, properties.href)
                                const selected = (e) => {
                                    this.onCommand.call(this, e);
                                    for (const child of this.node.parentNode.children) {
                                        if (child.classList.contains('navigationitem')) {
                                            child.classList.toggle('selected', (child === this.node));
                                        }
                                    }
                                }
                
                                this.node.onkeydown = (e) => {
                                    if (e.keyCode === 13) {
                                        selected(e);
                                    }
                                }
                
                                this.node.onclick = (e) => {
                                    selected(e);
                                } */
            }

            set label(str) { this.node.textContent = str; }

            set icon(str) { this.node.dataset.icon = str; }

            set href(str) { this.node.href = '#'.concat(str).replace(/#+/, '#'); }

            onCommand(e) { console.debug(e); }
        }


        CSS`
        section.flexlayout {
            outline: 2px solid yellow;
            background: #ffaa00ff;
            visibility: hidden;
        }
        section.flexlayout:target {
            visibility: visible;
        }
        `
        class FlexLayout extends Widget {

            set title(str) { this.node.querySelector('h2').textContent = str; }
